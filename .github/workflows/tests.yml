name: Run API Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Download the code from GitHub
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install packages
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          BASE_URL: https://reqres.in/api
          REQRES_API_KEY: ${{ secrets.REQRES_API_KEY }}
        run: python -m pytest tests/test_users.py -v
